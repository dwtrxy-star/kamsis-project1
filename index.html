<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Aplikasi Penyandian Data</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">
  <h1>Aplikasi Penyandian Data</h1>

  <label>Mode Operasi</label>
  <select id="mode">
    <option value="ECB">ECB</option>
    <option value="CBC">CBC</option>
    <option value="CFB">CFB</option>
  </select>

  <label>Kunci</label>
  <input type="text" id="key" placeholder="Masukkan kunci bebas">

  <label>IV (untuk CBC & CFB)</label>
  <input type="text" id="iv" placeholder="Masukkan IV bebas">

  <label>Input</label>
  <textarea id="inputText" placeholder="Masukkan teks..."></textarea>

  <div class="row">
    <button id="btnEncrypt">Enkripsi</button>
    <button id="btnDecrypt">Dekripsi</button>
  </div>

  <label>Output</label>
  <textarea id="outputText" readonly></textarea>

  <div class="info" id="info"></div>
</div>

<script src="app.js"></script>
</body>
</html>
